<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titanic Survival Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Titanic Survival Predictor</h1>
        <p>Enter the passenger details below to predict their survival probability.</p>
        
        <form id="predictorForm">
            <div class="input-group">
                <label for="pclass">Passenger Class (Pclass):</label>
                <select id="pclass" required>
                    <option value="1">1st Class (Upper)</option>
                    <option value="2">2nd Class (Middle)</option>
                    <option value="3">3rd Class (Lower)</option>
                </select>
            </div>

            <div class="input-group">
                <label for="sex">Gender:</label>
                <select id="sex" required>
                    <option value="female">Female</option>
                    <option value="male">Male</option>
                </select>
            </div>

            <div class="input-group">
                <label for="age">Age:</label>
                <input type="number" id="age" min="0" max="100" placeholder="e.g. 29" required>
            </div>

            <div class="input-group">
                <label for="sibsp">Siblings / Spouses Aboard (SibSp):</label>
                <input type="number" id="sibsp" min="0" max="10" value="0" required>
            </div>

            <div class="input-group">
                <label for="parch">Parents / Children Aboard (Parch):</label>
                <input type="number" id="parch" min="0" max="10" value="0" required>
            </div>

            <button type="submit">Predict Survival</button>
        </form>

        <div id="result" class="result-box hidden">
            <h2>Prediction Result</h2>
            <p id="predictionText"></p>
            <div class="progress-bar-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
